    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--sp-8);
      gap: var(--sp-6);
    }

    .error-code {
      font-size: var(--display);
      font-weight: var(--semibold);
      color: var(--text-faint);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .error-title {
      font-size: var(--heading);
      font-weight: var(--regular);
      color: var(--text);
      line-height: var(--tight);
    }

    .error-desc {
      font-size: var(--body);
      color: var(--text-muted);
      max-width: 36ch;
    }

    .error-links {
      display: flex;
      gap: var(--sp-4);
      flex-wrap: wrap;
      justify-content: center;
      margin-top: var(--sp-2);
    }

    .error-link {
      padding: 0.6rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: var(--sm);
      color: var(--text);
      transition: border-color var(--transition), color var(--transition);
    }

    .error-link:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .error-link--primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .error-link--primary:hover {
      opacity: 0.85;
    }
  </style>
